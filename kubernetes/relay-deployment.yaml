apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  labels:
    app: relay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: relay
  template:
    metadata:
      labels:
        app: relay
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: relay
          image: ghcr.io/lwj5/bridgertun-relay:latest
          ports:
            - name: ws
              containerPort: 8443
              protocol: TCP
            - name: api
              containerPort: 9000
              protocol: TCP
          env:
            - name: RELAY_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: relay
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: relay
