apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-config
data:
  OIDC_ISSUER_URL: "https://your-oidc-issuer"
  OIDC_AUDIENCE: "your-audience"
  OIDC_AGENT_CLIENT_ID: "your-agent-client-id"
  VALKEY_ADDR: "valkey:6379"
  VALKEY_TLS: "false"
  RELAY_PUBLIC_URL: "https://your-relay-domain"
  RELAY_ALLOWED_ORIGINS: ""
  LOG_LEVEL: "info"
